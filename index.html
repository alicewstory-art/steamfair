<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>细菌奥德赛：消化道之旅</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* 游戏主舞台：挂载你的背景图 */
        #game-container {
            width: 500px; /* 根据你的图片比例可适当调整 */
            height: 700px;
            background-image: url('digestive_system.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
            border: 4px solid #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 小细菌的样式（这里用了一个Emoji代替，你可以换成图片） */
        #bacteria {
            width: 30px;
            height: 30px;
            font-size: 24px;
            position: absolute;
            top: 50px; /* 初始位置：口腔 */
            left: 235px;
            transition: top 0.1s, left 0.1s;
            z-index: 10;
        }

        /* 顶部状态栏 */
        #status-bar {
            width: 500px;
            display: flex;
            justify-content: space-between;
            background-color: #34495e;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        /* 答题弹窗（默认隐藏） */
        #quiz-modal {
            display: none;
            position: absolute;
            top: 150px;
            left: 50px;
            width: 400px;
            background-color: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 20;
            box-sizing: border-box;
        }

        .quiz-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .quiz-btn:hover {
            background-color: #2980b9;
        }

        #message {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>生命值: <span id="health">100</span> ❤️</span>
        <span>当前位置: <span id="location">口腔</span></span>
    </div>

    <div id="game-container">
        <div id="bacteria">🦠</div>
        
        <div id="quiz-modal">
            <h3 id="quiz-title">关卡挑战！</h3>
            <p id="quiz-question">问题加载中...</p>
            <div id="quiz-options"></div>
            <p id="message"></p>
        </div>
    </div>

    <p>使用键盘 <strong>W, A, S, D</strong> 或 <strong>方向键</strong> 控制细菌移动。</p>

    <script>
        // --- 游戏状态变量 ---
        let bacX = 235;
        let bacY = 50;
        let health = 100;
        let isLocked = false; // 是否正在答题锁定移动
        let currentStage = 0; // 0:口腔到食道, 1:食道到胃, 2:胃到小肠

        // --- 获取DOM元素 ---
        const bacteria = document.getElementById('bacteria');
        const healthDisplay = document.getElementById('health');
        const locationDisplay = document.getElementById('location');
        const modal = document.getElementById('quiz-modal');
        const questionText = document.getElementById('quiz-question');
        const optionsDiv = document.getElementById('quiz-options');
        const messageText = document.getElementById('message');

        // --- 题库与触发坐标 ---
        // Y坐标(triggerY)表示细菌往下走到哪里会触发问题
        const stages = [
            {
                name: "食道入口",
                triggerY: 150, 
                question: "我们在咀嚼馒头时感觉越来越甜，是因为唾液里含有什么？",
                options: ["A. 胃蛋白酶", "B. 唾液淀粉酶", "C. 胆汁"],
                correctAnswer: 1, // 数组索引，1代表B
                hint: "想想‘唾液’里藏着什么对付淀粉的武器？"
            },
            {
                name: "贲门 (进入胃部)",
                triggerY: 350,
                question: "胃液呈强酸性，它主要初步消化哪种营养物质？",
                options: ["A. 脂肪", "B. 维生素", "C. 蛋白质"],
                correctAnswer: 2,
                hint: "吃肉比较扛饿，因为它们主要在这里被处理哦！"
            },
            {
                name: "幽门 (进入小肠)",
                triggerY: 520,
                question: "小肠内壁的环形皱襞和小肠绒毛，主要是为了什么？",
                options: ["A. 增加消化液分泌", "B. 增加吸收面积", "C. 加快蠕动速度"],
                correctAnswer: 1,
                hint: "这么多细小的绒毛，是为了接触到更多的营养。"
            }
        ];

        // --- 键盘移动控制 ---
        document.addEventListener('keydown', (e) => {
            if (isLocked) return; // 锁定状态下无法移动

            const speed = 15;
            switch(e.key) {
                case 'w': case 'W': case 'ArrowUp':
                    bacY = Math.max(0, bacY - speed);
                    break;
                case 's': case 'S': case 'ArrowDown':
                    bacY = Math.min(670, bacY + speed);
                    break;
                case 'a': case 'A': case 'ArrowLeft':
                    bacX = Math.max(0, bacX - speed);
                    break;
                case 'd': case 'D': case 'ArrowRight':
                    bacX = Math.min(470, bacX + speed);
                    break;
            }
            updatePosition();
            checkCheckpoints();
        });

        function updatePosition() {
            bacteria.style.top = bacY + 'px';
            bacteria.style.left = bacX + 'px';
            
            // 更新界面位置文本显示
            if(bacY < 150) locationDisplay.innerText = "口腔";
            else if(bacY < 350) locationDisplay.innerText = "食道";
            else if(bacY < 520) locationDisplay.innerText = "胃部";
            else locationDisplay.innerText = "肠道";
        }

        // --- 检查是否触发答题 ---
        function checkCheckpoints() {
            if (currentStage < stages.length) {
                let stageData = stages[currentStage];
                // 如果细菌向下移动超过了触发线
                if (bacY >= stageData.triggerY) {
                    triggerQuiz(stageData);
                }
            }
        }

        // --- 触发答题弹窗 ---
        function triggerQuiz(stageData) {
            isLocked = true; // 锁定移动
            messageText.innerText = "";
            questionText.innerText = stageData.question;
            optionsDiv.innerHTML = ""; // 清空旧选项

            // 生成选项按钮
            stageData.options.forEach((opt, index) => {
                let btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, stageData.correctAnswer, stageData.hint);
                optionsDiv.appendChild(btn);
            });

            modal.style.display = "block";
        }

        // --- 验证答案 ---
        function checkAnswer(selectedIndex, correctIndex, hint) {
            if (selectedIndex === correctIndex) {
                // 答对了
                modal.style.display = "none";
                isLocked = false;
                currentStage++; // 进入下一阶段
                // 稍微把细菌往下推一点，防止重复触发
                bacY += 20; 
                updatePosition();
            } else {
                // 答错了
                health -= 15;
                healthDisplay.innerText = health;
                messageText.innerText = "哎呀，不对哦！扣除15点生命。提示：" + hint;
                
                if(health <= 0) {
                    messageText.innerText = "生命值耗尽，游戏结束！请刷新页面重试。";
                    optionsDiv.innerHTML = ""; // 移除按钮
                }
            }
        }
    </script>
</body>
</html>
