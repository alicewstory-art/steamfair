<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digestive Dash: Organ Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #111; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        #game-container {
            width: 800px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,0.9); 
            border: 4px solid #444; 
            border-radius: 10px; 
            overflow: hidden;
            position: relative;
        }
        
        /* HTML overlays for UI popups */
        #celebration-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }
        #celebration-ui h1 { color: #00ffaa; text-shadow: 2px 2px 4px #000; font-size: 3em; margin: 0; }
        
        #warning-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            background: rgba(255, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            border: 5px solid yellow;
        }
        #warning-ui h1 { color: yellow; text-shadow: 2px 2px 4px #000; font-size: 4em; margin: 0; }
        #warning-ui p { color: white; font-size: 1.5em; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="celebration-ui">
        <h1>CORRECT!</h1>
        <div style="font-size: 4em;">🎉 🎈 🎊</div>
    </div>
    <div id="warning-ui">
        <h1>⚠️ CAUTION ⚠️</h1>
        <p>INCORRECT ANSWER!</p>
        <p>FLUSHING BACK TO PREVIOUS ORGAN!</p>
    </div>
</div>

<script>
// --- 1. QUIZ & LEVEL DATA ---
const quizData = [
    {
        organ: "Level 1: Mouth & Esophagus",
        bgColor: '#a33b4d', 
        questions: [
            { q: "What mechanical process starts digestion in the mouth?", options: ["1) Breathing", "2) Chewing", "3) Blinking"], correct: 2 },
            { q: "What enzyme in saliva breaks down carbohydrates?", options: ["1) Amylase", "2) Pepsin", "3) Acid"], correct: 1 },
            { q: "What is the tube that pushes food to the stomach called?", options: ["1) Trachea", "2) Intestine", "3) Esophagus"], correct: 3 }
        ]
    },
    {
        organ: "Level 2: Stomach",
        bgColor: '#cc4400', 
        questions: [
            { q: "What strong liquid dissolves food in the stomach?", options: ["1) Water", "2) Hydrochloric Acid", "3) Bile"], correct: 2 },
            { q: "What muscle movement churns the food here?", options: ["1) Peristalsis", "2) Flexing", "3) Shivering"], correct: 1 },
            { q: "What enzyme in the stomach digests proteins?", options: ["1) Lipase", "2) Pepsin", "3) Saliva"], correct: 2 }
        ]
    },
    {
        organ: "Level 3: Small Intestine",
        bgColor: '#b34270', 
        questions: [
            { q: "What is the main job of the small intestine?", options: ["1) Absorb Nutrients", "2) Store Waste", "3) Make Blood"], correct: 1 },
            { q: "What finger-like projections absorb the nutrients?", options: ["1) Villi", "2) Cilia", "3) Tentacles"], correct: 1 },
            { q: "Which organ sends bile to help digest fats here?", options: ["1) Heart", "2) Lungs", "3) Liver"], correct: 3 }
        ]
    },
    {
        organ: "Level 4: Large Intestine",
        bgColor: '#663311', 
        questions: [
            { q: "What does the large intestine primarily absorb?", options: ["1) Sugar", "2) Water", "3) Protein"], correct: 2 },
            { q: "What helpful microorganisms live here?", options: ["1) Good Bacteria", "2) Viruses", "3) Fungi"], correct: 1 },
            { q: "What is formed in the large intestine?", options: ["1) Chyme", "2) Feces (Waste)", "3) Urine"], correct: 2 }
        ]
    },
    {
        organ: "Level 5: Rectum & Anus",
        bgColor: '#221100', 
        questions: [
            { q: "What is the function of the rectum?", options: ["1) Store waste", "2) Digest food", "3) Pump blood"], correct: 1 },
            { q: "What type of muscle controls the exit (anus)?", options: ["1) Bicep", "2) Sphincter", "3) Cardiac"], correct: 2 },
            { q: "What is the final process of the digestive system called?", options: ["1) Ingestion", "2) Digestion", "3) Elimination"], correct: 3 }
        ]
    }
];

// --- 2. MAIN GAME SCENE ---
class MainScene extends Phaser.Scene {
    constructor() {
        super({ key: 'MainScene' });
        this.currentLevel = 0;
        this.starsCollected = 0;
        this.canDoubleJump = false;
        this.isQuizActive = false;
        this.activeStar = null;
    }

    preload() {
        let createGraphic = (key, w, h, drawFn) => {
            let canvas = this.textures.createCanvas(key, w, h);
            let ctx = canvas.getContext();
            if (drawFn) drawFn(ctx);
            canvas.refresh();
        };

        // Bacterium
        createGraphic('bacterium', 40, 30, (ctx) => { 
            ctx.strokeStyle = '#00ffaa'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(10, 15); ctx.bezierCurveTo(0, 5, 0, 25, -10, 15); ctx.stroke();
            ctx.fillStyle = '#00ffaa'; ctx.beginPath(); ctx.arc(15, 15, 10, Math.PI/2, Math.PI*3/2); ctx.lineTo(25, 5); ctx.arc(25, 15, 10, -Math.PI/2, Math.PI/2); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#009955'; ctx.beginPath(); ctx.arc(16, 15, 4, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(26, 12, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(22, 18, 2.5, 0, Math.PI * 2); ctx.fill();
        });

        // Other assets
        createGraphic('platform', 150, 20, (ctx) => { ctx.fillStyle = '#d46a6a'; ctx.fillRect(0, 0, 150, 20); });
        createGraphic('hazard', 100, 20, (ctx) => { ctx.fillStyle = '#fffc00'; ctx.fillRect(0, 0, 100, 20); }); 
        createGraphic('movePlat', 100, 20, (ctx) => { ctx.fillStyle = '#8833aa'; ctx.fillRect(0, 0, 100, 20); }); 
        createGraphic('bouncePlat', 100, 20, (ctx) => { ctx.fillStyle = '#55aa55'; ctx.fillRect(0, 0, 100, 20); }); 
        createGraphic('dropHazard', 15, 30, (ctx) => { ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.moveTo(7.5, 0); ctx.lineTo(15, 30); ctx.lineTo(0, 30); ctx.fill(); });
        createGraphic('star', 30, 30, (ctx) => { ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(20, 10); ctx.lineTo(30, 15); ctx.lineTo(20, 20); ctx.lineTo(15, 30); ctx.lineTo(10, 20); ctx.lineTo(0, 15); ctx.lineTo(10, 10); ctx.fill(); });
        
        // Confetti pieces
        createGraphic('confetti1', 10, 10, (ctx) => { ctx.fillStyle = '#ff0000'; ctx.fillRect(0, 0, 10, 10); });
        createGraphic('confetti2', 10, 10, (ctx) => { ctx.fillStyle = '#00ff00'; ctx.fillRect(0, 0, 10, 10); });
        createGraphic('confetti3', 10, 10, (ctx) => { ctx.fillStyle = '#0000ff'; ctx.fillRect(0, 0, 10, 10); });
        createGraphic('confetti4', 10, 10, (ctx) => { ctx.fillStyle = '#ffff00'; ctx.fillRect(0, 0, 10, 10); });
    }

    create() {
        this.cursors = this.input.keyboard.createCursorKeys();
        this.key1 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ONE);
        this.key2 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.TWO);
        this.key3 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.THREE);

        this.uiText = this.add.text(16, 16, '', { fontSize: '24px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 4 }).setDepth(10);
        this.progressText = this.add.text(16, 50, '', { fontSize: '18px', fill: '#ffd700', stroke: '#000', strokeThickness: 3 }).setDepth(10);
        
        this.quizContainer = this.add.container(400, 300).setDepth(20).setVisible(false);
        let quizBg = this.add.rectangle(0, 0, 600, 250, 0x000000, 0.95).setStrokeStyle(4, 0xffd700);
        this.quizTitle = this.add.text(0, -90, 'QUIZ TIME!', { fontSize: '24px', fill: '#ffd700', fontStyle: 'bold' }).setOrigin(0.5);
        this.quizText = this.add.text(0, -30, 'Question', { fontSize: '20px', fill: '#fff', align: 'center', wordWrap: { width: 550 } }).setOrigin(0.5);
        this.optionsText = this.add.text(0, 40, 'Options', { fontSize: '18px', fill: '#aaa', align: 'center' }).setOrigin(0.5);
        this.hintText = this.add.text(0, 100, '(Press 1, 2, or 3 to answer)', { fontSize: '14px', fill: '#555' }).setOrigin(0.5);
        this.quizContainer.add([quizBg, this.quizTitle, this.quizText, this.optionsText, this.hintText]);

        this.buildLevel();
    }

    buildLevel() {
        if (this.currentLevel >= quizData.length) {
            this.uiText.setText("CONGRATULATIONS! YOU ESCAPED!");
            this.progressText.setText("You have mastered the Digestive System!");
            document.getElementById('celebration-ui').style.display = 'flex';
            this.triggerConfetti();
            this.physics.pause();
            return;
        }

        this.starsCollected = 0;
        let levelInfo = quizData[this.currentLevel];
        this.cameras.main.setBackgroundColor(levelInfo.bgColor);
        this.uiText.setText(levelInfo.organ);
        this.updateProgressText();

        this.tweens.killAll();
        if (this.platforms) this.platforms.clear(true, true);
        if (this.hazards) this.hazards.clear(true, true);
        if (this.starsGroup) this.starsGroup.clear(true, true);
        if (this.movingPlatforms) this.movingPlatforms.clear(true, true);
        if (this.bouncyPlatforms) this.bouncyPlatforms.clear(true, true);
        if (this.fallingHazards) this.fallingHazards.clear(true, true);
        if (this.player) this.player.destroy();

        this.platforms = this.physics.add.staticGroup();
        this.hazards = this.physics.add.staticGroup();
        this.bouncyPlatforms = this.physics.add.staticGroup();
        this.starsGroup = this.physics.add.staticGroup();
        this.movingPlatforms = this.physics.add.group({ allowGravity: false, immovable: true });
        this.fallingHazards = this.physics.add.group({ allowGravity: false });

        this.platforms.create(400, 580, 'platform').setScale(6, 1).refreshBody(); 
        this.platforms.create(80, 500, 'platform'); 
        
        this.hazards.create(250, 560, 'hazard');
        let drop = this.fallingHazards.create(250, 50, 'dropHazard');
        this.tweens.add({ targets: drop, y: 550, duration: 1200, ease: 'Linear', repeat: -1, onRepeat: () => { drop.y = 50; } });

        let mPlat = this.movingPlatforms.create(350, 420, 'movePlat');
        mPlat.setVelocityX(100);
        this.tweens.add({ targets: mPlat.body.velocity, x: -100, duration: 2000, yoyo: true, repeat: -1 });

        this.bouncyPlatforms.create(550, 350, 'bouncePlat');
        this.platforms.create(700, 150, 'platform');

        this.starsGroup.create(250, 400, 'star'); 
        this.starsGroup.create(400, 380, 'star'); 
        this.starsGroup.create(700, 100, 'star'); 

        this.player = this.physics.add.sprite(50, 400, 'bacterium');
        this.player.setCollideWorldBounds(true);
        this.player.body.setSize(30, 20);
        this.player.body.setOffset(5, 5);

        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.collider(this.player, this.movingPlatforms);
        this.physics.add.collider(this.player, this.bouncyPlatforms, (player, platform) => {
            if (player.body.touching.down && platform.body.touching.up) {
                player.setVelocityY(-650); 
            }
        });

        this.physics.add.overlap(this.player, this.hazards, this.hitHazard, null, this);
        this.physics.add.overlap(this.player, this.fallingHazards, this.hitHazard, null, this);
        this.physics.add.overlap(this.player, this.starsGroup, this.hitStar, null, this);
    }

    updateProgressText() {
        this.progressText.setText(`Questions Answered: ${this.starsCollected} / 3`);
    }

    update() {
        if (this.isQuizActive) return;
        if (!this.player || !this.player.body) return;

        if (this.cursors.left.isDown) {
            this.player.setVelocityX(-200);
            this.player.setFlipX(true);
        } else if (this.cursors.right.isDown) {
            this.player.setVelocityX(200);
            this.player.setFlipX(false);
        } else {
            this.player.setVelocityX(0);
        }

        let isGrounded = this.player.body.touching.down || this.player.body.blocked.down;
        if (isGrounded) this.canDoubleJump = true;

        if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) {
            if (isGrounded) {
                this.player.setVelocityY(-400);
            } else if (this.canDoubleJump) {
                this.player.setVelocityY(-350);
                this.canDoubleJump = false;
            }
        }
    }

    hitHazard() {
        this.player.setPosition(50, 400);
        this.player.setVelocity(0, 0);
        this.cameras.main.shake(200, 0.01);
    }

    hitStar(player, star) {
        this.isQuizActive = true;
        this.activeStar = star;
        this.physics.pause();
        
        let qData = quizData[this.currentLevel].questions[this.starsCollected];
        this.quizText.setText(qData.q);
        this.optionsText.setText(qData.options.join('\n\n'));
        this.quizContainer.setVisible(true);
    }
    
    triggerConfetti() {
        let particles = this.add.particles('confetti1');
        particles.setDepth(5
