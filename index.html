<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digestive Dash - Update 2</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 900px; height: 600px; }
        
        /* Quiz UI CSS */
        #quiz-overlay {
            display: none; position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            width: 400px; background: rgba(20, 20, 20, 0.95); border: 3px solid #3742fa;
            border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 0 20px rgba(55, 66, 250, 0.5);
            z-index: 10;
        }
        #quiz-question { font-size: 1.2rem; margin-bottom: 20px; }
        .quiz-btn {
            display: block; width: 100%; padding: 10px; margin: 10px 0; background: #2ed573;
            color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .quiz-btn:hover { background: #7bed9f; transform: scale(1.02); }
        #message { margin-top: 15px; font-weight: bold; height: 20px; }

        /* NEW: Caution Sign CSS */
        #caution-sign {
            display: none; position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
            background: #ff4757; color: #fff200; border: 8px solid #fff200; padding: 30px;
            font-size: 2.5rem; font-weight: 900; text-align: center; border-radius: 15px;
            z-index: 100; text-shadow: 3px 3px 0px #000; box-shadow: 0 0 50px #ff4757;
            text-transform: uppercase; letter-spacing: 2px;
            animation: flashWarning 0.4s infinite alternate;
        }
        
        @keyframes flashWarning { 
            from { opacity: 1; transform: translateX(-50%) scale(1); } 
            to { opacity: 0.8; transform: translateX(-50%) scale(1.05); } 
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-overlay">
        <h2>Organ Gateway!</h2>
        <div id="quiz-question">Question goes here?</div>
        <div id="quiz-options"></div>
        <div id="message"></div>
    </div>
    
    <div id="caution-sign">
        ⚠️ CAUTION ⚠️<br>
        <span style="font-size: 1.5rem; color: white; text-shadow: 2px 2px #000;">Hazard Level Reached!<br>Try Again!</span>
    </div>
</div>

<script>
// --- EDUCATIONAL QUIZ DATA ---
const quizData = [
    { level: "Mouth", question: "What enzyme in saliva begins breaking down starches?", options: ["Pepsin", "Amylase", "Bile", "Lipase"], answer: 1 },
    { level: "Stomach", question: "What deadly pool did you just jump over in the stomach?", options: ["Sulfuric Acid", "Hydrochloric Acid", "Citric Acid", "Nitric Acid"], answer: 1 },
];

// --- PHASER GAME SCENE ---
class PlayScene extends Phaser.Scene {
    constructor() {
        super({ key: 'PlayScene' });
        this.startX = 50; 
        this.startY = 400; 
        this.jumps = 0;
        this.canDash = true;
    }

    create() {
        this.cameras.main.setBackgroundColor('#8b0000'); 
        
        // --- NEW: Generate graphics for Confetti & Balloons dynamically ---
        let gfx = this.make.graphics();
        // Confetti texture (small square)
        gfx.fillStyle(0xffffff);
        gfx.fillRect(0, 0, 10, 10);
        gfx.generateTexture('confetti', 10, 10);
        // Balloon texture (circle)
        gfx.clear();
        gfx.fillStyle(0xffffff);
        gfx.fillCircle(15, 15, 15);
        gfx.generateTexture('balloon', 30, 30);
        gfx.destroy(); // Clean up

        // Platforms & Hazards
        this.platforms = this.physics.add.staticGroup();
        this.createPlatform(50, 500, 200, 40, 0xd2dae2); 
        this.createPlatform(350, 400, 100, 40, 0xf1c40f); 
        this.createPlatform(550, 300, 100, 40, 0xf1c40f); 
        this.createPlatform(750, 200, 150, 40, 0xd2dae2); 

        this.hazards = this.physics.add.staticGroup();
        let acid = this.add.rectangle(450, 580, 900, 40, 0x2ed573); 
        this.physics.add.existing(acid, true);
        this.hazards.add(acid);

        // Gateway
        this.gateway = this.add.rectangle(850, 150, 40, 100, 0x3742fa);
        this.physics.add.existing(this.gateway, true);

        // Player
        this.player = this.add.rectangle(this.startX, this.startY, 30, 30, 0xffffff);
        this.physics.add.existing(this.player);
        this.player.body.setGravityY(800); 
        this.player.body.setMaxVelocity(400, 800);
        this.player.body.setCollideWorldBounds(true);

        // Collisions
        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.overlap(this.player, this.hazards, this.hitHazard, null, this);
        this.physics.add.overlap(this.player, this.gateway, this.hitGateway, null, this);

        // Controls
        this.cursors = this.input.keyboard.createCursorKeys();
        this.shiftKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT);
        this.isQuizActive = false;
        
        this.add.text(10, 10, "Arrows: Move/Jump | Double-tap Up: Double Jump\nShift: Dash | Reach the blue gateway!", { fill: '#fff', fontSize: '14px' });
    }

    createPlatform(x, y, w, h, color) {
        let plat = this.add.rectangle(x, y, w, h, color);
        this.physics.add.existing(plat, true);
        this.platforms.add(plat);
    }

    update() {
        if (this.isQuizActive) return;

        const body = this.player.body;
        const speed = 200;

        if (body.touching.down) this.jumps = 0;

        if (this.cursors.left.isDown) body.setVelocityX(-speed);
        else if (this.cursors.right.isDown) body.setVelocityX(speed);
        else body.setVelocityX(0);

        if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) {
            if (body.touching.down) {
                body.setVelocityY(-500);
                this.jumps = 1;
            } else if (this.jumps === 1) {
                body.setVelocityY(-400); 
                this.jumps = 2;
            }
        }

        if (Phaser.Input.Keyboard.JustDown(this.shiftKey) && this.canDash) {
            let dashDirection = this.cursors.left.isDown ? -1 : 1;
            body.setVelocityX(dashDirection * 800);
            body.setVelocityY(-100); 
            this.canDash = false;
            this.time.delayedCall(1000, () => { this.canDash = true; });
        }
    }

    hitHazard() {
        this.player.body.setVelocity(0, 0);
        this.player.setPosition(this.startX, this.startY);
        this.cameras.main.shake(200, 0.02);
    }

    hitGateway() {
        if (this.isQuizActive) return;
        this.isQuizActive = true;
        this.player.body.setVelocity(0, 0);
        this.player.body.allowGravity = false;
        triggerQuiz(1, this); 
    }

    // --- NEW: Celebration Particle System ---
    triggerCelebration() {
        const colors = [0xff4757, 0x2ed573, 0x1e90ff, 0xffa502, 0xff7f50, 0x9b59b6];

        // Confetti exploding from top
        let confettiEmitter = this.add.particles('confetti').createEmitter({
            x: { min: 0, max: 900 }, y: -10,
            lifespan: 3000,
            speedY: { min: 100, max: 300 }, speedX: { min: -50, max: 50 },
            scale: { start: 1, end: 0 },
            quantity: 4,
            tint: colors,
            blendMode: 'ADD'
        });

        // Balloons floating up from bottom
        let balloonEmitter = this.add.particles('balloon').createEmitter({
            x: { min: 50, max: 850 }, y: 650,
            lifespan: 4000,
            speedY: { min: -100, max: -250 }, speedX: { min: -20, max: 20 },
            scale: { start: 0.8, end: 1.5 },
            quantity: 1, frequency: 250,
            tint: colors
        });

        // Clean up particles after 4 seconds
        this.time.delayedCall(4000, () => {
            confettiEmitter.stop();
            balloonEmitter.stop();
        });
    }
}

// --- GAME CONFIGURATION ---
const config = {
    type: Phaser.AUTO, width: 900, height: 600,
    parent: 'game-container',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: PlayScene
};
const game = new Phaser.Game(config);

// --- QUIZ OVERLAY LOGIC (HTML/CSS) ---
function triggerQuiz(questionIndex, scene) {
    const overlay = document.getElementById('quiz-overlay');
    const qText = document.getElementById('quiz-question');
    const optionsDiv = document.getElementById('quiz-options');
    const msg = document.getElementById('message');
    
    let qData = quizData[questionIndex];
    qText.innerText = qData.question;
    optionsDiv.innerHTML = '';
    msg.innerText = '';
    overlay.style.display = 'block';

    qData.options.forEach((opt, index) => {
        let btn = document.createElement('button');
        btn.className = 'quiz-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(index, qData.answer, scene, overlay, msg);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selectedIndex, correctIndex, scene, overlay, msg) {
    const cautionSign = document.getElementById('caution-sign');

    if (selectedIndex === correctIndex) {
        // --- NEW: Trigger Celebration ---
        msg.style.color = '#2ed573';
        msg.innerText = "Correct! Gateway Opened!";
        scene.triggerCelebration(); 
        
        setTimeout(() => {
            overlay.style.display = 'none';
            if (scene.gateway) scene.gateway.destroy(); 
            scene.player.body.allowGravity = true;
            scene.isQuizActive = false;
            scene.player.fillColor = 0x2ed573; // Player turns green to show powerup!
        }, 1500);
    } else {
        // --- NEW: Trigger Caution Sign ---
        overlay.style.display = 'none'; // Hide quiz to show the big warning
        cautionSign.style.display = 'block'; // Show bright red caution box
        
        setTimeout(() => {
            cautionSign.style.display = 'none'; // Hide warning
            scene.player.body.allowGravity = true;
            scene.isQuizActive = false;
            scene.hitHazard(); // Teleport back to start
        }, 2500); // Show warning for 2.5 seconds
    }
}
</script>
</body>
</html>
