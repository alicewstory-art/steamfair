<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digestive System Microbe Adventure</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 1s ease;
            background-color: #ffb6c1; /* Starts at Mouth */
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header & UI --- */
        #ui-bar {
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: absolute;
            top: 0;
            z-index: 10;
        }

        #organ-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }

        #progress-text {
            font-size: 16px;
            color: #666;
            margin-top: 5px;
        }

        /* --- Game Area --- */
        #game-area {
            position: relative;
            width: 800px;
            height: 600px;
            margin-top: 100px;
            border: 4px solid white;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        /* --- The Microbe --- */
        #microbe {
            position: absolute;
            top: 50%;
            left: 50px;
            transform: translateY(-50%);
            width: 120px;
            height: 60px;
            background-color: #8A2BE2; /* Purple */
            border-radius: 50px; /* Pill shape */
            border: 3px solid #4B0082;
            transition: left 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: space-around;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);
            z-index: 2;
        }

        /* Microbe Face & Spots */
        .eye { width: 15px; height: 15px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .eye::after { content: ''; width: 6px; height: 6px; background: black; border-radius: 50%; }
        .eye-left { margin-top: -15px; transform: scale(1.2); } /* Asymmetrical eyes */
        .eye-right { margin-top: -10px; }
        .mouth { width: 30px; height: 10px; background: black; border-radius: 0 0 20px 20px; display: flex; justify-content: space-between; overflow: hidden; margin-top: 15px;}
        .fang { width: 8px; height: 8px; background: white; clip-path: polygon(0 0, 100% 0, 50% 100%); }
        .spot { position: absolute; width: 8px; height: 8px; background: #4B0082; border-radius: 50%; bottom: 10px; opacity: 0.7;}
        .flagella { position: absolute; left: -20px; width: 30px; height: 3px; background: #8A2BE2; border-radius: 5px; }

        /* --- The Star --- */
        #star-btn {
            position: absolute;
            top: 50%;
            left: 300px;
            transform: translateY(-50%);
            font-size: 60px;
            cursor: pointer;
            background: none;
            border: none;
            animation: pulse 1.5s infinite;
            z-index: 2;
        }

        @keyframes pulse {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.2); }
            100% { transform: translateY(-50%) scale(1); }
        }

        /* --- Question Modal --- */
        #question-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 20;
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .option-btn {
            background: #fff; color: #333; border: none; padding: 15px 30px; margin: 10px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 300px; transition: 0.2s;
        }
        .option-btn:hover { background: #ffdf00; }

        /* --- Confetti --- */
        .confetti {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            animation: fall 2s ease-out forwards;
            z-index: 30;
        }

        @keyframes fall {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(300px) scale(0.5) rotate(360deg); opacity: 0; }
        }

        #message {
            position: absolute; font-size: 40px; font-weight: bold; color: yellow; z-index: 25; text-shadow: 2px 2px 10px black; display: none; top: 20%;
        }

    </style>
</head>
<body>

    <div id="ui-bar">
        <h2 id="organ-title">Mouth</h2>
        <p id="progress-text">Question 1 of 2</p>
    </div>

    <div id="game-area">
        <div id="message"></div>

        <div id="microbe">
            <div class="flagella" style="top: 15px;"></div>
            <div class="flagella" style="top: 30px; left: -25px;"></div>
            <div class="flagella" style="top: 45px;"></div>
            <div class="spot" style="left: 20px;"></div>
            <div class="spot" style="left: 40px;"></div>
            <div class="spot" style="left: 70px;"></div>
            <div class="eye eye-left"></div>
            <div class="mouth">
                <div class="fang"></div>
                <div class="fang"></div>
            </div>
            <div class="eye eye-right"></div>
        </div>

        <button id="star-btn">⭐</button>

        <div id="question-modal">
            <h2 id="question-text">Question goes here?</h2>
            <div id="options-container"></div>
        </div>
    </div>

    <script>
        const tractData = [
            { name: "Mouth", color: "#ffb6c1", questions: [
                { q: "What enzyme in the mouth starts breaking down starches?", options: ["Pepsin", "Amylase", "Bile"], a: 1 },
                { q: "What do we call the chewed ball of food that is swallowed?", options: ["Bolus", "Chyme", "Plasma"], a: 0 }
            ]},
            { name: "Esophagus", color: "#d6336c", questions: [
                { q: "What are the wave-like muscle contractions that push food down?", options: ["Gravity", "Peristalsis", "Digestion"], a: 1 },
                { q: "True or False: Gravity is the only thing that moves food to the stomach.", options: ["True", "False"], a: 1 }
            ]},
            { name: "Stomach", color: "#ff0000", questions: [
                { q: "Which strong acid is found here to break down food?", options: ["Citric acid", "Hydrochloric acid", "Lactic acid"], a: 1 },
                { q: "Once the food is mixed with stomach juices, it becomes a paste called:", options: ["Chyme", "Bolus", "Feces"], a: 0 }
            ]},
            { name: "Small Intestine", color: "#ff66b2", questions: [
                { q: "What are the tiny, finger-like projections that absorb nutrients?", options: ["Cilia", "Villi", "Flagella"], a: 1 },
                { q: "Which organ produces bile to help digest fats?", options: ["Pancreas", "Kidney", "Liver"], a: 2 }
            ]},
            { name: "Large Intestine", color: "#8b4513", questions: [
                { q: "What is the main substance absorbed back into the body here?", options: ["Protein", "Water", "Sugar"], a: 1 },
                { q: "Millions of helpful bacteria live here to break down leftovers.", options: ["True", "False"], a: 0 }
            ]},
            { name: "Rectum", color: "#5c2e0e", questions: [
                { q: "What does the rectum temporarily store?", options: ["Vitamins", "Urine", "Waste (Feces)"], a: 2 },
                { q: "Sensors in the rectum wall do what when it is full?", options: ["Send a signal to the brain", "Dissolve the food", "Create more acid"], a: 0 }
            ]},
            { name: "Anus", color: "#3e1f09", questions: [
                { q: "What type of circular muscles control the release of waste?", options: ["Biceps", "Sphincter muscles", "Cardiac muscles"], a: 1 },
                { q: "This is the final step of which body system?", options: ["Nervous System", "Respiratory System", "Digestive System"], a: 2 }
            ]}
        ];

        let currentOrgan = 0;
        let currentQuestion = 0;
        let microbePosition = 50;

        const uiOrganTitle = document.getElementById("organ-title");
        const uiProgress = document.getElementById("progress-text");
        const modal = document.getElementById("question-modal");
        const qText = document.getElementById("question-text");
        const optionsContainer = document.getElementById("options-container");
        const starBtn = document.getElementById("star-btn");
        const microbe = document.getElementById("microbe");
        const msg = document.getElementById("message");

        // Initialize Game
        function updateUI() {
            if(currentOrgan >= tractData.length) {
                uiOrganTitle.innerText = "You Survived!";
                uiProgress.innerText = "You made it through the digestive tract!";
                starBtn.style.display = "none";
                return;
            }
            
            const organ = tractData[currentOrgan];
            document.body.style.backgroundColor = organ.color;
            uiOrganTitle.innerText = organ.name;
            uiProgress.innerText = `Question ${currentQuestion + 1} of 2`;
            
            // Move star slightly ahead of microbe
            starBtn.style.left = (microbePosition + 250) + "px";
        }

        // Open Question
        starBtn.addEventListener("click", () => {
            const qData = tractData[currentOrgan].questions[currentQuestion];
            qText.innerText = qData.q;
            optionsContainer.innerHTML = "";
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, qData.a);
                optionsContainer.appendChild(btn);
            });
            
            modal.style.display = "flex";
        });

        // Check Answer
        function checkAnswer(selectedIndex, correctIndex) {
            modal.style.display = "none";
            
            if(selectedIndex === correctIndex) {
                triggerConfetti();
                showMessage("Correct! 🎉", "#00ff00");
                
                // Move microbe forward
                microbePosition += 150;
                microbe.style.left = microbePosition + "px";
                
                currentQuestion++;
                if(currentQuestion >= 2) {
                    currentQuestion = 0;
                    currentOrgan++;
                    
                    // Reset position if moving to new organ to keep it on screen
                    if(currentOrgan < tractData.length) {
                        setTimeout(() => {
                            microbePosition = 50;
                            microbe.style.left = microbePosition + "px";
                            updateUI();
                        }, 1000);
                    } else {
                        // Win state
                        setTimeout(() => { triggerMassiveConfetti(); updateUI(); }, 1000);
                    }
                } else {
                    updateUI();
                }
            } else {
                showMessage("Try Again! ❌", "#ff0000");
            }
        }

        function showMessage(text, color) {
            msg.innerText = text;
            msg.style.color = color;
            msg.style.display = "block";
            setTimeout(() => { msg.style.display = "none"; }, 1500);
        }

        function triggerConfetti() {
            for(let i=0; i<15; i++) {
                createConfettiPiece();
            }
        }

        function triggerMassiveConfetti() {
            for(let i=0; i<100; i++) {
                setTimeout(createConfettiPiece, Math.random() * 2000);
            }
        }

        function createConfettiPiece() {
            const piece = document.createElement("div");
            piece.innerText = "🎉";
            piece.className = "confetti";
            piece.style.left = (Math.random() * 100) + "vw";
            piece.style.top = "-50px";
            document.body.appendChild(piece);
            
            setTimeout(() => { piece.remove(); }, 2000);
        }

        updateUI();
    </script>
</body>
</html>
