<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digestive Dash</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #222; font-family: Arial, sans-serif; }
        #game-container { box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
// --- 1. QUIZ DATA ---
const quizQuestions = [
    {
        organ: "Mouth & Esophagus",
        question: "What enzyme in saliva starts breaking down carbohydrates?",
        options: ["1) Pepsin", "2) Amylase", "3) Lipase"],
        correct: 2
    },
    {
        organ: "Stomach",
        question: "Which strong acid is primarily found in the stomach to dissolve food?",
        options: ["1) Sulfuric Acid", "2) Citric Acid", "3) Hydrochloric Acid"],
        correct: 3
    },
    {
        organ: "Small Intestine",
        question: "What are the tiny, finger-like projections that absorb nutrients here?",
        options: ["1) Villi", "2) Cilia", "3) Flagella"],
        correct: 1
    },
    {
        organ: "Large Intestine",
        question: "What is the main function of the large intestine?",
        options: ["1) Break down proteins", "2) Absorb water", "3) Create bile"],
        correct: 2
    },
    {
        organ: "Rectum & Anus",
        question: "Where is waste stored right before it is expelled from the body?",
        options: ["1) The Rectum", "2) The Appendix", "3) The Gallbladder"],
        correct: 1
    }
];

// --- 2. MAIN GAME SCENE ---
class MainScene extends Phaser.Scene {
    constructor() {
        super({ key: 'MainScene' });
        this.currentLevel = 0;
        this.canDoubleJump = false;
        this.isQuizActive = false;
    }

    preload() {
        // Generating placeholder graphics
        let canvas = this.textures.createCanvas('bacterium', 30, 30);
        let ctx = canvas.getContext();
        ctx.fillStyle = '#00ffaa'; // Friendly green bacteria
        ctx.beginPath(); ctx.arc(15, 15, 15, 0, Math.PI * 2); ctx.fill();
        canvas.refresh();

        let platCanvas = this.textures.createCanvas('platform', 200, 20);
        let pCtx = platCanvas.getContext();
        pCtx.fillStyle = '#aa5555'; // Flesh-colored platforms
        pCtx.fillRect(0, 0, 200, 20);
        platCanvas.refresh();

        let hazardCanvas = this.textures.createCanvas('hazard', 100, 20);
        let hCtx = hazardCanvas.getContext();
        hCtx.fillStyle = '#fffc00'; // Yellow stomach acid / toxic bad bacteria
        hCtx.fillRect(0, 0, 100, 20);
        hazardCanvas.refresh();

        let gateCanvas = this.textures.createCanvas('gateway', 40, 100);
        let gCtx = gateCanvas.getContext();
        gCtx.fillStyle = '#00d4ff'; // Blue energy gateway
        gCtx.fillRect(0, 0, 40, 100);
        gateCanvas.refresh();
    }

    create() {
        // Controls
        this.cursors = this.input.keyboard.createCursorKeys();
        this.key1 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ONE);
        this.key2 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.TWO);
        this.key3 = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.THREE);

        // UI Texts
        this.levelText = this.add.text(16, 16, '', { fontSize: '24px', fill: '#fff' }).setDepth(10);
        this.instructionText = this.add.text(16, 50, 'Arrows: Move | UP: Jump/Double Jump', { fontSize: '16px', fill: '#ccc' }).setDepth(10);
        
        this.quizContainer = this.add.container(400, 300).setDepth(20).setVisible(false);
        let quizBg = this.add.rectangle(0, 0, 600, 200, 0x000000, 0.9);
        this.quizText = this.add.text(0, -60, 'Quiz Question', { fontSize: '20px', fill: '#fff', align: 'center', wordWrap: { width: 550 } }).setOrigin(0.5);
        this.optionsText = this.add.text(0, 20, 'Options', { fontSize: '18px', fill: '#ffcc00', align: 'center' }).setOrigin(0.5);
        this.quizContainer.add([quizBg, this.quizText, this.optionsText]);

        this.buildLevel();
    }

    buildLevel() {
        if (this.currentLevel >= quizQuestions.length) {
            this.levelText.setText("YOU ESCAPED! YOU WIN!");
            this.physics.pause();
            return;
        }

        // Clean up previous level
        if (this.platforms) this.platforms.clear(true, true);
        if (this.hazards) this.hazards.clear(true, true);
        if (this.gateway) this.gateway.destroy();
        if (this.player) this.player.destroy();

        let levelData = quizQuestions[this.currentLevel];
        this.levelText.setText(`Level ${this.currentLevel + 1}: ${levelData.organ}`);
        
        // Background color shifts as you go deeper
        let bgColors = ['#4a0e17', '#8a2b0d', '#611624', '#3d2010', '#1a0b06'];
        this.cameras.main.setBackgroundColor(bgColors[this.currentLevel]);

        this.platforms = this.physics.add.staticGroup();
        this.hazards = this.physics.add.staticGroup();

        // Level Design (Procedural layout for demonstration)
        this.platforms.create(100, 500, 'platform');
        this.platforms.create(400, 400, 'platform');
        this.platforms.create(700, 300, 'platform');
        this.platforms.create(400, 580, 'platform').setScale(4, 1).refreshBody(); // Floor

        // Hazards (Acid / Bad Bacteria)
        this.hazards.create(400, 560, 'hazard');
        
        // Player
        this.player = this.physics.add.sprite(50, 400, 'bacterium');
        this.player.setCollideWorldBounds(true);
        this.player.setBounce(0.2);

        // Gateway to next organ
        this.gateway = this.physics.add.sprite(750, 230, 'gateway');
        this.gateway.setImmovable(true);
        this.gateway.body.allowGravity = false;

        // Collisions
        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.overlap(this.player, this.hazards, this.hitHazard, null, this);
        this.physics.add.overlap(this.player, this.gateway, this.triggerQuiz, null, this);
    }

    update() {
        if (this.isQuizActive) {
            this.handleQuizInput();
            return;
        }

        if (!this.player || !this.player.body) return;

        // Parkour Movement Logic
        if (this.cursors.left.isDown) {
            this.player.setVelocityX(-200);
        } else if (this.cursors.right.isDown) {
            this.player.setVelocityX(200);
        } else {
            this.player.setVelocityX(0);
        }

        // Jump and Double Jump
        let isGrounded = this.player.body.touching.down;
        if (isGrounded) {
            this.canDoubleJump = true;
        }

        if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) {
            if (isGrounded) {
                this.player.setVelocityY(-400); // First jump
            } else if (this.canDoubleJump) {
                this.player.setVelocityY(-350); // Double jump
                this.canDoubleJump = false;
            }
        }
    }

    hitHazard() {
        // Punishment: Teleport to start of the level
        this.player.setPosition(50, 400);
        this.player.setVelocity(0, 0);
        this.cameras.main.shake(200, 0.01); // Quick screen shake effect
    }

    triggerQuiz() {
        this.isQuizActive = true;
        this.physics.pause();
        this.player.setTint(0x555555);

        let qData = quizQuestions[this.currentLevel];
        this.quizText.setText(`WARNING: GATEWAY BLOCKED!\n\n${qData.question}`);
        this.optionsText.setText(`${qData.options.join('\n')}\n\n(Press 1, 2, or 3)`);
        this.quizContainer.setVisible(true);
    }

    handleQuizInput() {
        let qData = quizQuestions[this.currentLevel];
        let answered = 0;

        if (Phaser.Input.Keyboard.JustDown(this.key1)) answered = 1;
        if (Phaser.Input.Keyboard.JustDown(this.key2)) answered = 2;
        if (Phaser.Input.Keyboard.JustDown(this.key3)) answered = 3;

        if (answered !== 0) {
            this.quizContainer.setVisible(false);
            this.isQuizActive = false;
            this.physics.resume();
            this.player.clearTint();

            if (answered === qData.correct) {
                // Correct: Advance to next level
                this.currentLevel++;
                this.buildLevel();
            } else {
                // Incorrect: Punishment (Reset to start of level)
                this.player.setPosition(50, 400);
                this.player.setVelocity(0, 0);
                // Optional: Add a text popup saying "Wrong! Try again."
            }
        }
    }
}

// --- 3. GAME CONFIGURATION ---
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 800 },
            debug: false
        }
    },
    scene: [MainScene]
};

const game = new Phaser.Game(config);
</script>
</body>
</html>
