<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digestive Parkour Adventure</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        #ui-bar {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        #organ-title {
            font-size: 32px;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #controls-hint {
            font-size: 16px;
            color: #aaa;
        }

        /* --- Game Area --- */
        #game-area {
            position: relative;
            width: 800px;
            height: 500px;
            border: 4px solid white;
            border-radius: 10px;
            background-color: #ffb6c1; /* Default Mouth color */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: background-color 1s ease;
        }

        /* --- Platforms --- */
        .platform {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }

        /* --- The Star (Goal) --- */
        #star {
            position: absolute;
            font-size: 40px;
            line-height: 40px;
            width: 40px;
            height: 40px;
            text-align: center;
            animation: pulse 1s infinite alternate;
            z-index: 5;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* --- The Microbe (Player) --- */
        #microbe {
            position: absolute;
            width: 70px;
            height: 35px;
            background-color: #8A2BE2;
            border-radius: 35px;
            border: 2px solid #4B0082;
            display: flex;
            align-items: center;
            justify-content: space-around;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3);
            z-index: 10;
            box-sizing: border-box;
        }

        /* Scaled down Microbe Features */
        .eye { width: 10px; height: 10px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .eye::after { content: ''; width: 4px; height: 4px; background: black; border-radius: 50%; }
        .eye-left { margin-top: -8px; transform: scale(1.2); } 
        .eye-right { margin-top: -3px; }
        .mouth { width: 20px; height: 7px; background: black; border-radius: 0 0 10px 10px; display: flex; justify-content: space-between; overflow: hidden; margin-top: 8px;}
        .fang { width: 5px; height: 5px; background: white; clip-path: polygon(0 0, 100% 0, 50% 100%); }
        .spot { position: absolute; width: 5px; height: 5px; background: #4B0082; border-radius: 50%; bottom: 5px; opacity: 0.7;}
        .flagella { position: absolute; left: -12px; width: 15px; height: 2px; background: #8A2BE2; border-radius: 5px; }

        /* --- Screen Messages --- */
        #message-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }

        #message-text {
            font-size: 40px;
            font-weight: bold;
            color: #ffdf00;
            margin-bottom: 20px;
            text-align: center;
        }

        .confetti {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            animation: fall 2s ease-out forwards;
            z-index: 30;
        }

        @keyframes fall {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(500px) scale(0.5) rotate(360deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="ui-bar">
        <h2 id="organ-title">Mouth</h2>
        <div id="controls-hint">Use <b>Arrows</b> to Move | <b>Space</b> to Jump</div>
    </div>

    <div id="game-area">
        <div id="microbe">
            <div class="flagella" style="top: 8px;"></div>
            <div class="flagella" style="top: 17px; left: -15px;"></div>
            <div class="flagella" style="top: 26px;"></div>
            <div class="spot" style="left: 12px;"></div>
            <div class="spot" style="left: 25px;"></div>
            <div class="spot" style="left: 40px;"></div>
            <div class="eye eye-left"></div>
            <div class="mouth">
                <div class="fang"></div>
                <div class="fang"></div>
            </div>
            <div class="eye eye-right"></div>
        </div>

        <div id="star">⭐</div>

        <div id="platform-container"></div>

        <div id="message-overlay">
            <div id="message-text">Level Complete!</div>
        </div>
    </div>

    <script>
        // --- Game Data & Levels ---
        // Each level has a color and an array of platforms [x, y, width, height]. The star is at star: [x, y].
        const levels = [
            { 
                name: "Mouth", color: "#ffb6c1", 
                startX: 30, startY: 300,
                star: [700, 150],
                platforms: [
                    [0, 450, 800, 50],   // Floor
                    [200, 350, 100, 20], // Jump 1
                    [400, 250, 100, 20], // Jump 2
                    [600, 200, 150, 20]  // Star Platform
                ]
            },
            { 
                name: "Esophagus", color: "#d6336c", 
                startX: 50, startY: 50,
                star: [700, 400],
                platforms: [
                    [0, 150, 150, 20],   // Start ledge
                    [250, 250, 100, 20], // Drop 1
                    [100, 350, 100, 20], // Drop 2
                    [350, 450, 150, 20], // Drop 3
                    [650, 450, 150, 20]  // Star Platform
                ]
            },
            { 
                name: "Stomach (Acid!)", color: "#ff0000", 
                startX: 30, startY: 200,
                star: [720, 100],
                platforms: [
                    [0, 300, 100, 20],   // Start
                    [150, 350, 80, 20],  // Gap jumps over "acid" (bottom of screen)
                    [300, 300, 80, 20],  
                    [450, 250, 80, 20],
                    [600, 180, 80, 20],
                    [700, 150, 100, 20]  // Star Platform
                ]
            },
            { 
                name: "Small Intestine", color: "#ff66b2", 
                startX: 30, startY: 300,
                star: [50, 100],
                platforms: [
                    [0, 400, 150, 20],   // Start
                    [250, 350, 50, 20],  // Tiny platforms (villi)
                    [350, 300, 50, 20],
                    [450, 250, 50, 20],
                    [550, 200, 50, 20],
                    [400, 150, 80, 20],  // Climbing back left
                    [200, 120, 80, 20],
                    [30, 150, 100, 20]   // Star Platform
                ]
            },
            { 
                name: "Large Intestine", color: "#8b4513", 
                startX: 30, startY: 300,
                star: [700, 350],
                platforms: [
                    [0, 400, 200, 20],   // Start
                    [300, 300, 200, 20], // Wide jumps
                    [600, 400, 200, 20]  // Star Platform
                ]
            },
            { 
                name: "Rectum", color: "#5c2e0e", 
                startX: 350, startY: 50,
                star: [350, 420],
                platforms: [
                    [300, 150, 200, 20], // Start
                    [200, 250, 100, 20], // Zig zag down
                    [500, 350, 100, 20],
                    [300, 470, 200, 20]  // Star Platform
                ]
            },
            { 
                name: "Anus (The Exit!)", color: "#3e1f09", 
                startX: 50, startY: 200,
                star: [700, 200],
                platforms: [
                    [0, 300, 100, 20],
                    [200, 250, 100, 20],
                    [400, 200, 100, 20],
                    [650, 250, 150, 20]  // Final Platform
                ]
            }
        ];

        // --- Physics & Game State ---
        let currentLevel = 0;
        let animationFrameId;
        
        const player = {
            el: document.getElementById("microbe"),
            x: 50, y: 50,
            width: 70, height: 35,
            vx: 0, vy: 0,
            speed: 5,
            jumpPower: -12,
            gravity: 0.6,
            grounded: false
        };

        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false,
            Space: false
        };

        const gameArea = document.getElementById("game-area");
        const platformContainer = document.getElementById("platform-container");
        const starEl = document.getElementById("star");
        const uiOrganTitle = document.getElementById("organ-title");
        const overlay = document.getElementById("message-overlay");
        const msgText = document.getElementById("message-text");

        // --- Input Handling ---
        window.addEventListener("keydown", (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = true;
        });

        window.addEventListener("keyup", (e) => {
            if(keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        // --- Level Setup ---
        function loadLevel(index) {
            if(index >= levels.length) {
                winGame();
                return;
            }

            const lvl = levels[index];
            gameArea.style.backgroundColor = lvl.color;
            uiOrganTitle.innerText = lvl.name;

            // Reset Player
            player.x = lvl.startX;
            player.y = lvl.startY;
            player.vx = 0;
            player.vy = 0;

            // Place Star
            starEl.style.left = lvl.star[0] + "px";
            starEl.style.top = lvl.star[1] + "px";

            // Draw Platforms
            platformContainer.innerHTML = "";
            lvl.platforms.forEach(p => {
                const pEl = document.createElement("div");
                pEl.className = "platform";
                pEl.style.left = p[0] + "px";
                pEl.style.top = p[1] + "px";
                pEl.style.width = p[2] + "px";
                pEl.style.height = p[3] + "px";
                platformContainer.appendChild(pEl);
            });

            overlay.style.display = "none";
            startGameLoop();
        }

        // --- Main Game Loop ---
        function update() {
            // Horizontal Movement
            if (keys.ArrowLeft) player.vx = -player.speed;
            else if (keys.ArrowRight) player.vx = player.speed;
            else player.vx = 0;

            // Jumping
            if ((keys.ArrowUp || keys.Space) && player.grounded) {
                player.vy = player.jumpPower;
                player.grounded = false;
            }

            // Apply Gravity
            player.vy += player.gravity;

            // Apply Velocity
            player.x += player.vx;
            player.y += player.vy;

            // Screen boundaries (Walls)
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > 800) player.x = 800 - player.width;

            // Death Pit (Fall off bottom)
            if (player.y > 550) {
                // Respawn
                player.x = levels[currentLevel].startX;
                player.y = levels[currentLevel].startY;
                player.vy = 0;
            }

            // Collision Detection with Platforms
            player.grounded = false;
            const platforms = levels[currentLevel].platforms;
            
            for (let i = 0; i < platforms.length; i++) {
                let px = platforms[i][0], py = platforms[i][1], pw = platforms[i][2], ph = platforms[i][3];
                
                // Check if falling DOWN onto a platform
                if (player.vy > 0 && 
                    player.x + player.width > px && 
                    player.x < px + pw && 
                    player.y + player.height >= py && 
                    player.y + player.height <= py + player.vy + 2) { // +2 grace threshold
                    
                    player.grounded = true;
                    player.vy = 0;
                    player.y = py - player.height;
                }
            }

            // Collision Detection with Star
            let sx = levels[currentLevel].star[0], sy = levels[currentLevel].star[1];
            if (player.x < sx + 40 && player.x + player.width > sx &&
                player.y < sy + 40 && player.y + player.height > sy) {
                levelComplete();
                return; // Stop updating this frame
            }

            // Update DOM element
            player.el.style.left = player.x + "px";
            player.el.style.top = player.y + "px";

            animationFrameId = requestAnimationFrame(update);
        }

        function startGameLoop() {
            cancelAnimationFrame(animationFrameId);
            update();
        }

        // --- Transitions ---
        function levelComplete() {
            cancelAnimationFrame(animationFrameId);
            triggerConfetti(20);
            
            overlay.style.display = "flex";
            msgText.innerText = "Organ Cleared! 🎉";
            msgText.style.color = "#00ff00";

            setTimeout(() => {
                currentLevel++;
                loadLevel(currentLevel);
            }, 1500);
        }

        function winGame() {
            cancelAnimationFrame(animationFrameId);
            uiOrganTitle.innerText = "You Survived the Digestive Tract!";
            overlay.style.display = "flex";
            msgText.innerText = "You Win! 🏆";
            msgText.style.color = "#ffdf00";
            
            // Endless massive confetti
            setInterval(() => triggerConfetti(5), 300);
        }

        function triggerConfetti(amount) {
            for(let i=0; i<amount; i++) {
                const piece = document.createElement("div");
                piece.innerText = "🎉";
                piece.className = "confetti";
                piece.style.left = (Math.random() * 100) + "%";
                piece.style.top = "-50px";
                gameArea.appendChild(piece);
                setTimeout(() => piece.remove(), 2000);
            }
        }

        // Start Game
        loadLevel(currentLevel);

    </script>
</body>
</html>
