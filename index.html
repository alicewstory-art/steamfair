<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digestive Dash</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; }
        /* Quiz UI CSS */
        #quiz-overlay {
            display: none; position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            width: 400px; background: rgba(20, 20, 20, 0.95); border: 3px solid #ff4757;
            border-radius: 10px; padding: 20px; text-align: center; box-shadow: 0 0 20px rgba(255, 71, 87, 0.5);
        }
        #quiz-question { font-size: 1.2rem; margin-bottom: 20px; }
        .quiz-btn {
            display: block; width: 100%; padding: 10px; margin: 10px 0; background: #2ed573;
            color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
            transition: background 0.2s;
        }
        .quiz-btn:hover { background: #7bed9f; }
        #message { margin-top: 15px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-overlay">
        <h2>Organ Gateway!</h2>
        <div id="quiz-question">Question goes here?</div>
        <div id="quiz-options"></div>
        <div id="message"></div>
    </div>
</div>

<script>
// --- EDUCATIONAL QUIZ DATA ---
const quizData = [
    { level: "Mouth", question: "What enzyme in saliva begins breaking down starches?", options: ["Pepsin", "Amylase", "Bile", "Lipase"], answer: 1 },
    { level: "Stomach", question: "What deadly pool did you just jump over in the stomach?", options: ["Sulfuric Acid", "Hydrochloric Acid", "Citric Acid", "Nitric Acid"], answer: 1 },
    { level: "Small Intestine", question: "What are the tiny finger-like projections that absorb nutrients called?", options: ["Villi", "Cilia", "Flagella", "Alveoli"], answer: 0 },
    { level: "Large Intestine", question: "What is the primary function of the Large Intestine?", options: ["Absorb Nutrients", "Break down proteins", "Absorb Water", "Produce Bile"], answer: 2 },
    { level: "General", question: "Where is bile produced before helping digest fats?", options: ["Pancreas", "Gallbladder", "Liver", "Stomach"], answer: 2 }
];

// --- PHASER GAME SCENE ---
class PlayScene extends Phaser.Scene {
    constructor() {
        super({ key: 'PlayScene' });
        this.startX = 50; // Checkpoint X
        this.startY = 400; // Checkpoint Y
        this.jumps = 0;
        this.canDash = true;
    }

    preload() {
        // In a real game, you would load high-res assets here:
        // this.load.image('bg', 'assets/stomach_bg.png');
        // this.load.spritesheet('bacterium', 'assets/player.png', { frameWidth: 32, frameHeight: 32 });
    }

    create() {
        // 1. Environment / Graphics Setup (Using basic shapes as placeholders)
        this.cameras.main.setBackgroundColor('#8b0000'); // Dark red stomach environment
        
        // Platforms (Chunks of dissolving food)
        this.platforms = this.physics.add.staticGroup();
        this.createPlatform(50, 500, 200, 40, 0xd2dae2); // Start platform
        this.createPlatform(350, 400, 100, 40, 0xf1c40f); // Bouncy food chunk
        this.createPlatform(550, 300, 100, 40, 0xf1c40f); // Bouncy food chunk
        this.createPlatform(750, 200, 150, 40, 0xd2dae2); // Gateway platform

        // Hazards (Stomach Acid)
        this.hazards = this.physics.add.staticGroup();
        let acid = this.add.rectangle(400, 580, 800, 40, 0x2ed573); // Green acid pool
        this.physics.add.existing(acid, true);
        this.hazards.add(acid);

        // Gateway (Pyloric Sphincter to Small Intestine)
        this.gateway = this.add.rectangle(850, 150, 40, 100, 0x3742fa);
        this.physics.add.existing(this.gateway, true);

        // 2. Player Setup (The Bacterium)
        this.player = this.add.rectangle(this.startX, this.startY, 30, 30, 0xffffff);
        this.physics.add.existing(this.player);
        this.player.body.setGravityY(800); // Mario-like heavy gravity
        this.player.body.setMaxVelocity(400, 800);
        this.player.body.setCollideWorldBounds(true);

        // 3. Collisions
        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.overlap(this.player, this.hazards, this.hitHazard, null, this);
        this.physics.add.overlap(this.player, this.gateway, this.hitGateway, null, this);

        // 4. Input Controls
        this.cursors = this.input.keyboard.createCursorKeys();
        this.shiftKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SHIFT);
        this.isQuizActive = false;
        
        // Instructions Text
        this.add.text(10, 10, "Arrows to Move/Jump. Double-tap Up to Double Jump.\nShift to Dash. Reach the blue gateway!", { fill: '#fff' });
    }

    createPlatform(x, y, w, h, color) {
        let plat = this.add.rectangle(x, y, w, h, color);
        this.physics.add.existing(plat, true);
        this.platforms.add(plat);
    }

    update() {
        if (this.isQuizActive) return; // Freeze player during quiz

        const body = this.player.body;
        const speed = 200;

        // Reset double jump when touching ground
        if (body.touching.down) {
            this.jumps = 0;
        }

        // Horizontal Movement
        if (this.cursors.left.isDown) {
            body.setVelocityX(-speed);
        } else if (this.cursors.right.isDown) {
            body.setVelocityX(speed);
        } else {
            body.setVelocityX(0);
        }

        // Jump & Double Jump Logic
        if (Phaser.Input.Keyboard.JustDown(this.cursors.up)) {
            if (body.touching.down) {
                body.setVelocityY(-500);
                this.jumps = 1;
            } else if (this.jumps === 1) {
                body.setVelocityY(-400); // Double jump
                this.jumps = 2;
            }
        }

        // Dash Mechanic (Air or Ground)
        if (Phaser.Input.Keyboard.JustDown(this.shiftKey) && this.canDash) {
            let dashDirection = this.cursors.left.isDown ? -1 : 1;
            body.setVelocityX(dashDirection * 800);
            body.setVelocityY(-100); // Slight anti-gravity bump
            this.canDash = false;
            
            // Cooldown for Dash
            this.time.delayedCall(1000, () => { this.canDash = true; });
        }
    }

    hitHazard() {
        // Respawn at checkpoint (Teleport to start of organ)
        this.player.body.setVelocity(0, 0);
        this.player.setPosition(this.startX, this.startY);
        
        // Camera shake effect for damage
        this.cameras.main.shake(200, 0.02);
    }

    hitGateway() {
        if (this.isQuizActive) return;
        
        // Trigger Quiz
        this.isQuizActive = true;
        this.player.body.setVelocity(0, 0);
        this.player.body.allowGravity = false;
        
        triggerQuiz(1, this); // Load Stomach question (Index 1)
    }
}

// --- GAME CONFIGURATION ---
const config = {
    type: Phaser.AUTO,
    width: 900,
    height: 600,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: PlayScene
};

const game = new Phaser.Game(config);

// --- QUIZ OVERLAY LOGIC (HTML/CSS) ---
function triggerQuiz(questionIndex, scene) {
    const overlay = document.getElementById('quiz-overlay');
    const qText = document.getElementById('quiz-question');
    const optionsDiv = document.getElementById('quiz-options');
    const msg = document.getElementById('message');
    
    let qData = quizData[questionIndex];
    
    qText.innerText = qData.question;
    optionsDiv.innerHTML = '';
    msg.innerText = '';
    overlay.style.display = 'block';

    qData.options.forEach((opt, index) => {
        let btn = document.createElement('button');
        btn.className = 'quiz-btn';
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(index, qData.answer, scene, overlay, msg);
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(selectedIndex, correctIndex, scene, overlay, msg) {
    if (selectedIndex === correctIndex) {
        msg.style.color = '#2ed573';
        msg.innerText = "Correct! Energy Power-Up Granted!";
        
        // Success: Hide UI, destroy gateway, resume game
        setTimeout(() => {
            overlay.style.display = 'none';
            scene.gateway.destroy(); // Break barrier
            scene.player.body.allowGravity = true;
            scene.isQuizActive = false;
            // Visual flair for powerup
            scene.player.fillColor = 0xf1c40f; 
        }, 1500);
    } else {
        msg.style.color = '#ff4757';
        msg.innerText = "Incorrect! Time Penalty & Respawn!";
        
        // Punishment: Hide UI, teleport back, resume game
        setTimeout(() => {
            overlay.style.display = 'none';
            scene.player.body.allowGravity = true;
            scene.isQuizActive = false;
            scene.hitHazard(); // Reuse hazard logic to teleport to start
        }, 1500);
    }
}
</script>
</body>
</html>
